name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to package, for example 1.0.0"
        required: false
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history and tags, needed to build the changelog between tags.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Test
        run: CI=true yarn test --watchAll=false

      - name: Build WebUI
        run: yarn build
        env:
          NODE_OPTIONS: --openssl-legacy-provider

      - name: Package qbitctl
        id: package
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          ZIP_PATH="$(scripts/package-release.sh "$VERSION")"
          LATEST_PATH="$(dirname "$ZIP_PATH")/qbitctl.zip"
          echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"
          echo "zip_name=$(basename "$ZIP_PATH")" >> "$GITHUB_OUTPUT"
          echo "latest_path=$LATEST_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.zip_name }}
          path: ${{ steps.package.outputs.zip_path }}

      - name: Build changelog
        if: startsWith(github.ref, 'refs/tags/')
        id: changelog
        run: |
          # Detailed changelog: commit subjects with their full bodies nested
          # below, skipping the "Release qbitctl x.y.z" bump commits and
          # Co-Authored-By trailers.
          PREV_TAG="$(git describe --tags --match 'v[0-9]*' --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)"
          RANGE="${GITHUB_REF_NAME}"
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${GITHUB_REF_NAME}"
          fi
          {
            echo 'body<<CHANGELOG_EOF'
            git log --no-merges --grep='^Release qbitctl' --invert-grep \
              --pretty=format:'- %s%n%w(0,2,2)%b' "$RANGE" \
              | grep -v 'Co-Authored-By:' \
              | sed -e 's/[[:space:]]*$//' \
              | cat -s
            echo
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          # The fixed-name qbitctl.zip rides on every numbered release, so the
          # "Latest"-badge alias URL is permanent:
          # https://github.com/mstraa/qbitctl-webui/releases/latest/download/qbitctl.zip
          make_latest: true
          body: ${{ steps.changelog.outputs.body }}
          files: |
            ${{ steps.package.outputs.zip_path }}
            ${{ steps.package.outputs.latest_path }}
