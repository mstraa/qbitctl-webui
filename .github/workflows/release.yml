name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to package, for example 1.0.0"
        required: false
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Test
        run: CI=true yarn test --watchAll=false

      - name: Build WebUI
        run: yarn build
        env:
          NODE_OPTIONS: --openssl-legacy-provider

      - name: Package qbitctl
        id: package
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          ZIP_PATH="$(scripts/package-release.sh "$VERSION")"
          LATEST_PATH="$(dirname "$ZIP_PATH")/qbitctl-latest.zip"
          echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"
          echo "zip_name=$(basename "$ZIP_PATH")" >> "$GITHUB_OUTPUT"
          echo "latest_path=$LATEST_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.zip_name }}
          path: ${{ steps.package.outputs.zip_path }}

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          make_latest: true
          files: ${{ steps.package.outputs.zip_path }}

      - name: Update rolling latest release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Move the rolling "latest" tag to this release commit and rebuild its
          # release, so this URL always serves the newest build:
          # https://github.com/mstraa/qbitctl-webui/releases/download/latest/qbitctl-latest.zip
          gh release delete latest --yes || true
          git push origin :refs/tags/latest || true
          git tag -f latest
          git push origin latest
          gh release create latest "${{ steps.package.outputs.latest_path }}" \
            --title "latest (${GITHUB_REF_NAME})" \
            --latest=false \
            --notes "Rolling release that always tracks the newest version, currently ${GITHUB_REF_NAME}. Stable download URL: https://github.com/${GITHUB_REPOSITORY}/releases/download/latest/qbitctl-latest.zip"
